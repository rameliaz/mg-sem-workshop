<script>
// Return only leaf <section> elements — sections that do NOT contain child sections.
// This avoids relying on Reveal.js adding the .stack class (which is timing-dependent).
function getLeafSlides() {
  var all = document.querySelectorAll('.reveal .slides section');
  return Array.from(all).filter(function(s) {
    return s.querySelectorAll(':scope > section').length === 0;
  });
}

function manageLogos() {
  var slides = getLeafSlides();
  if (slides.length === 0) return;

  slides.forEach(function(slide, index) {
    // Handle title slide (first leaf slide)
    if (index === 0) {
      slide.querySelectorAll('.slide-logo').forEach(function(l) { l.remove(); });
      if (!slide.querySelector('.title-slide-logo')) {
        var titleLogo = document.createElement('img');
        titleLogo.src = '../img/logo.png';
        titleLogo.className = 'title-slide-logo';
        titleLogo.alt = 'Universitas Airlangga Logo';
        slide.insertBefore(titleLogo, slide.firstChild);
      }
      return;
    }

    var bgColor = slide.getAttribute('data-background-color');
    var logoSrc = (bgColor === '#14497F' || bgColor === '#14497f')
      ? '../img/logo_white.png'
      : '../img/logo.png';

    var existingLogos = slide.querySelectorAll('.slide-logo');

    if (existingLogos.length === 1) {
      existingLogos[0].src = logoSrc;
    } else {
      existingLogos.forEach(function(l) { l.remove(); });
      var logo = document.createElement('img');
      logo.src = logoSrc;
      logo.className = 'slide-logo';
      logo.alt = 'Universitas Airlangga Logo';
      slide.appendChild(logo);
    }
  });
}

function initLogoManager() {
  if (typeof Reveal !== 'undefined') {
    Reveal.on('ready', manageLogos);
    Reveal.on('slidechanged', manageLogos);
  }
  // Fallback: always run after a short delay in case events were already fired
  setTimeout(manageLogos, 500);
}

// Handle both cases: script runs before or after DOMContentLoaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLogoManager);
} else {
  initLogoManager();
}
</script>

<style>
/* Additional inline styles for logo */
.reveal .slide-logo {
  position: absolute !important;
  top: 8px !important;
  right: 15px !important;
  max-height: 80px !important;
  max-width: 200px !important;
  z-index: 100 !important;
  object-fit: contain;
}

/* Ensure title slide doesn't have logo overlap */
.reveal .title-slide {
  padding-right: 220px;
}

/* Section divider slides - logo top-left, fully visible */
.reveal section[data-background-color] .slide-logo {
  left: 15px !important;
  right: auto !important;
  top: 15px !important;
}

/* Section title slide styling */
.reveal section[data-background-color] h1,
.reveal section[data-background-color] h2 {
  color: white !important;
}
</style>
